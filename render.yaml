services:
  - type: web
    name: ai-gateway
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        value: skip_for_now
      - key: ANTHROPIC_API_KEY
        value: skip_for_now
      - key: GOOGLE_API_KEY
        value: skip_for_now
